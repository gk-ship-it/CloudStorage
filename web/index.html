<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloud Storage</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Cloud Storage</p>
        <h1>Files</h1>
        <p class="user-name" id="usernameText">User</p>
      </div>

      <div class="topbar-center">
        <button class="icon-button" id="refreshButton" type="button" title="Refresh files" aria-label="Refresh files">
          <span aria-hidden="true">↻</span>
        </button>
        <button class="icon-button" id="darkModeButton" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span aria-hidden="true">◐</span>
        </button>
      </div>

      <div class="topbar-actions">
        <button class="text-button" id="changePasswordButton" type="button">
            Change Password
        </button>
        <button class="danger-button" id="logoutButton" type="button">
            Logout
        </button>
      </div>
    </header>

    <section class="upload-panel" aria-label="Upload file">
      <div class="file-control">
        <input id="fileInput" type="file">
        <input id="fileNameInput" type="text" placeholder="filename.txt" autocomplete="off">
      </div>
      <button class="primary-button" id="uploadButton" type="button">Upload</button>
      <div class="upload-progress" id="uploadProgressWrap" hidden>
        <progress id="uploadProgress" value="0" max="100"></progress>
        <span id="uploadProgressText">0%</span>
      </div>
    </section>

    <section class="status-row" aria-live="polite">
      <p id="statusText">Ready</p>
      <p id="fileCount">0 files</p>
    </section>

    <input
      type="text"
      id="searchInput"
      placeholder="Search files..."
    >

    <section class="category-bar">
      <button class="category-btn" data-category="all">
        All
      </button>

      <button class="category-btn" data-category="documents">
        Documents
      </button>

      <button class="category-btn" data-category="photos">
        Photos
      </button>

      <button class="category-btn" data-category="videos">
        Videos
      </button>

      <button class="category-btn" data-category="archives">
        Archives
      </button>

      <button class="category-btn" data-category="others">
        Others
      </button>
    </section>

    <section class="file-area" aria-label="Stored files">
      <div class="table-head" aria-hidden="true">
        <span>Name</span>
        <span>Size</span>
        <span>Uploaded</span>
        <span>Actions</span>
      </div>
      <div id="fileList" class="file-list"></div>
    </section>
  </main>

  <dialog id="detailDialog" class="dialog">
    <div class="dialog-head">
      <h2 id="detailTitle">File</h2>
      <button class="icon-button small" id="closeDialogButton" type="button" title="Close" aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <pre id="detailBody"></pre>
  </dialog>

  <dialog id="passwordDialog" class="dialog">
  <div class="dialog-head">
    <h2>Change Password</h2>

    <button
      class="icon-button small"
      id="closePasswordDialogButton"
      type="button"
      title="Close"
      aria-label="Close">
      <span aria-hidden="true">×</span>
    </button>
  </div>

  <input
    type="password"
    id="oldPasswordInput"
    placeholder="Old Password"
  >

  <input
    type="password"
    id="newPasswordInput"
    placeholder="New Password"
  >

  <button
    id="submitPasswordButton"
    type="button">
    Change Password
  </button>
</dialog>

<dialog id="renameDialog" class="dialog">
  <div class="dialog-head">
    <h2>Rename File</h2>

    <button
      class="icon-button small"
      id="closeRenameDialogButton"
      type="button">
      <span aria-hidden="true">×</span>
    </button>
  </div>

  <input
    type="text"
    id="renameInput"
    placeholder="New filename"
  >

  <button
    id="submitRenameButton"
    type="button">
    Rename
  </button>
</dialog>


  <script src="app.js"></script>
</body>

</html>
